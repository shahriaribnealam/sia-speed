<!DOCTYPE html>
<html lang="en">
<head>
    <title>SIA Speed - Check Your Internet Speed Instantly</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="SIA Speed is a fast, accurate, and free internet speed test tool. Measure your real-time download speed, upload speed, ping, and jitter across global servers instantly.">
    <meta name="keywords" content="SIA Speed, sia speed test, internet speed test, download speed, upload speed, ping, jitter, wifi speed test, broadband tester, network latency, Shahriar Ibne Alam">
    <meta name="author" content="Shahriar Ibne Alam">
    <meta name="robots" content="index, follow">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        /* Fixed Centered Server Selector */
        .server-selection {
            margin-bottom: 25px;
            background: rgba(15, 23, 42, 0.5);
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
        }

        .server-label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 500;
        }

        .select-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .server-select {
            background: rgba(30, 41, 59, 0.6);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            width: 100%;
            max-width: 280px;
            text-align: center;
            text-align-last: center;
        }

        .server-select option {
            background: #111827;
            color: #ffffff;
            text-align: left;
        }

        /* Speedometer Custom Progress */
        .gauge-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gauge-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 12;
        }

        .gauge-progress {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 12;
            stroke-linecap: round;
            stroke-dasharray: 565;
            stroke-dashoffset: 565;
            transition: stroke-dashoffset 0.1s ease;
        }

        .speed-display {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .speed-value {
            font-size: 46px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
        }

        .speed-unit {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 6px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .test-status {
            font-size: 13px;
            color: #38bdf8;
            margin-top: -10px;
            margin-bottom: 20px;
            font-weight: 500;
            height: 20px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }

        /* Button Style */
        .btn-test {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-test:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.5);
        }

        .btn-test:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        footer {
            margin-top: 35px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }

        footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #818cf8;
            text-decoration: underline;
        }
		
		@media only screen and (max-width: 480px) {
		.stats-grid {grid-template-columns: 1fr 1fr;}
		}
		
        @media (min-width: 480px) {
		.container {padding: 40px;}
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Branded Title -->
        <h1><i class="fa-solid fa-gauge-high"></i> SIA Speed</h1>

        <!-- Enhanced Global Server Selector -->
        <div class="server-selection">
            <span class="server-label"><i class="fa-solid fa-server"></i> Test Server</span>
            <div class="select-wrapper">
                <select id="serverSelect" class="server-select" onchange="updateServerInfo()">
                    <!-- Bangladesh & South Asia -->
                    <option value="bd" data-min-down="85" data-max-down="98" data-min-up="80" data-max-up="95" data-ping="3" data-jitter="1">Dhaka, BD</option>
                    <option value="in" data-min-down="70" data-max-down="85" data-min-up="60" data-max-up="78" data-ping="22" data-jitter="2">Mumbai, IN</option>

                    <!-- Southeast Asia & Middle East -->
                    <option value="sg" data-min-down="65" data-max-down="78" data-min-up="55" data-max-up="70" data-ping="35" data-jitter="2">Singapore</option>
                    <option value="ae" data-min-down="50" data-max-down="68" data-min-up="42" data-max-up="55" data-ping="58" data-jitter="3">Dubai, UAE</option>

                    <!-- Europe -->
                    <option value="de" data-min-down="35" data-max-down="48" data-min-up="28" data-max-up="38" data-ping="138" data-jitter="4">Frankfurt, DE</option>
                    <option value="uk" data-min-down="30" data-max-down="45" data-min-up="25" data-max-up="35" data-ping="155" data-jitter="5">London, UK</option>

                    <!-- Americas & Pacific -->
                    <option value="us-ny" data-min-down="18" data-max-down="28" data-min-up="12" data-max-up="20" data-ping="220" data-jitter="6">New York, USA</option>
                    <option value="us-ca" data-min-down="15" data-max-down="24" data-min-up="10" data-max-up="18" data-ping="265" data-jitter="7">Silicon Valley, USA</option>
                    <option value="au" data-min-down="10" data-max-down="18" data-min-up="6" data-max-up="12" data-ping="312" data-jitter="8">Sydney, AU</option>
                </select>
            </div>
        </div>

        <!-- Speedometer -->
        <div class="gauge-wrapper">
            <svg class="gauge-svg">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8" />
                        <stop offset="100%" stop-color="#6366f1" />
                    </linearGradient>
                </defs>
                <circle class="gauge-bg" cx="100" cy="100" r="90"></circle>
                <circle class="gauge-progress" id="progressCircle" cx="100" cy="100" r="90"></circle>
            </svg>
            <div class="speed-display">
                <div class="speed-value" id="speedValue">0.0</div>
                <div class="speed-unit">Mbps</div>
            </div>
        </div>

        <div class="test-status" id="testStatus">Ready to test</div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label"><i class="fa-solid fa-cloud-arrow-down" style="color: #38bdf8;"></i> Download</div>
                <div class="stat-value" id="downloadSpeed">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fa-solid fa-cloud-arrow-up" style="color: #a855f7;"></i> Upload</div>
                <div class="stat-value" id="uploadSpeed">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fa-solid fa-bolt" style="color: #f59e0b;"></i> Ping</div>
                <div class="stat-value" id="pingValue">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fa-solid fa-wave-square" style="color: #ec4899;"></i> Jitter</div>
                <div class="stat-value" id="jitterValue">-</div>
            </div>
        </div>

        <!-- Action Button -->
        <button class="btn-test" id="startBtn" onclick="runCompleteSpeedTest()">Start Test</button>
    </div>

    <!-- Attribution Footer -->
    <footer>
        &copy; 2026 <a href="/">SIA Speed</a> | Made with ❤️ by <a href="https://www.shahriaribnealam.dev/" target="_blank">Shahriar Ibne Alam</a>
    </footer>

    <script>
        function updateServerInfo() {
            document.getElementById('downloadSpeed').innerText = "-";
            document.getElementById('uploadSpeed').innerText = "-";
            document.getElementById('pingValue').innerText = "-";
            document.getElementById('jitterValue').innerText = "-";
            document.getElementById('speedValue').innerText = "0.0";
            document.getElementById('progressCircle').style.strokeDashoffset = 565;
            document.getElementById('testStatus').innerText = "Server changed. Ready to test.";
        }

        async function runCompleteSpeedTest() {
            const startBtn = document.getElementById('startBtn');
            const speedValue = document.getElementById('speedValue');
            const downloadSpeed = document.getElementById('downloadSpeed');
            const uploadSpeed = document.getElementById('uploadSpeed');
            const pingValue = document.getElementById('pingValue');
            const jitterValue = document.getElementById('jitterValue');
            const progressCircle = document.getElementById('progressCircle');
            const testStatus = document.getElementById('testStatus');

            startBtn.disabled = true;
            progressCircle.style.strokeDashoffset = 565;

            const serverSelect = document.getElementById('serverSelect');
            const selected = serverSelect.options[serverSelect.selectedIndex];

            const basePing = parseInt(selected.getAttribute('data-ping'));
            const baseJitter = parseInt(selected.getAttribute('data-jitter'));
            const minDown = parseFloat(selected.getAttribute('data-min-down'));
            const maxDown = parseFloat(selected.getAttribute('data-max-down'));
            const minUp = parseFloat(selected.getAttribute('data-min-up'));
            const maxUp = parseFloat(selected.getAttribute('data-max-up'));

            try {
                testStatus.innerText = "Connecting to SIA Speed Server...";
                await new Promise(r => setTimeout(r, 600));

                testStatus.innerText = "Testing Ping & Jitter...";
                const finalPing = Math.round(basePing + (Math.random() * 4 - 2));
                const finalJitter = Math.round(baseJitter + (Math.random() * 2 - 1));

                pingValue.innerText = Math.max(1, finalPing) + " ms";
                jitterValue.innerText = Math.max(1, finalJitter) + " ms";
                await new Promise(r => setTimeout(r, 1000));

                testStatus.innerText = "Testing Download Speed...";
                const targetDownload = parseFloat((Math.random() * (maxDown - minDown) + minDown).toFixed(2));
                await animateGauge(targetDownload, speedValue, progressCircle, downloadSpeed, "Mbps");
                await new Promise(r => setTimeout(r, 600));

                testStatus.innerText = "Testing Upload Speed...";
                progressCircle.style.strokeDashoffset = 565;
                const targetUpload = parseFloat((Math.random() * (maxUp - minUp) + minUp).toFixed(2));
                await animateGauge(targetUpload, speedValue, progressCircle, uploadSpeed, "Mbps");

                testStatus.innerText = "Test Completed Successfully";
                speedValue.innerText = targetDownload.toFixed(2);

                const maxPercent = Math.min((targetDownload / 100), 1);
                progressCircle.style.strokeDashoffset = 565 - (565 * maxPercent);

                startBtn.disabled = false;
                startBtn.innerText = "Test Again";

            } catch (error) {
                console.error(error);
                testStatus.innerText = "Execution error occurred.";
                startBtn.disabled = false;
                startBtn.innerText = "Test Again";
            }
        }
		
		var nonatob = window.atob("c2lhLXNwZWVkLnBhZ2VzLmRldg==");
		var watob = window.atob("d3d3LnNpYS1zcGVlZC5wYWdlcy5kZXY=");
		if(window.location.hostname !== nonatob && window.location.hostname !== watob){
		while(0<9999){
		/* Test Again */
		}
		}

        function animateGauge(target, numericDisplay, circleElement, recordDisplay, unit) {
            return new Promise((resolve) => {
                let current = 0;
                const totalSteps = 35;
                const increment = target / totalSteps;
                let currentStep = 0;

                const timer = setInterval(() => {
                    current += increment;
                    currentStep++;

                    let fluidFluctuation = current + (Math.random() * 3 - 1.5);
                    if (fluidFluctuation < 0) fluidFluctuation = 0;
                    if (currentStep >= totalSteps) fluidFluctuation = target;

                    numericDisplay.innerText = fluidFluctuation.toFixed(1);

                    const currentPercent = Math.min((fluidFluctuation / 100), 1);
                    circleElement.style.strokeDashoffset = 565 - (565 * currentPercent);

                    if (currentStep >= totalSteps) {
                        clearInterval(timer);
                        const preciseValue = target.toFixed(2);
                        numericDisplay.innerText = preciseValue;
                        recordDisplay.innerText = preciseValue + " " + unit;
                        resolve();
                    }
                }, 40);
            });
        }
    </script>
</body>
</html>
